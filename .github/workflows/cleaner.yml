name: 🗑 Clean Downloads Folder

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: '⚠️ تایید پاکسازی: کلمه DELETE را وارد کنید'
        required: true
        default: 'DELETE'

jobs:
  clean:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Check confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "DELETE" ]; then
            echo "❌ پاکسازی لغو شد. کلمه 'DELETE' باید وارد شود."
            exit 1
          fi
          echo "✅ تایید شد. شروع پاکسازی..."

      - name: Remove downloads folder from Git
        run: |
          if [ -d "downloads" ]; then
            echo "Removing 'downloads' folder from Git tracking..."
            git rm -rf downloads/
          else
            echo "Folder 'downloads' does not exist."
          fi

      - name: Create empty placeholder
        run: |
          mkdir -p downloads
          echo "# Downloads Folder" > downloads/README.md
          echo "" >> downloads/README.md
          echo "This folder is currently empty. Use the download workflow to add files." >> downloads/README.md
          git add downloads/README.md

      - name: Commit and Push changes
        run: |
          git commit -m "🗑 Cleaned downloads folder [skip ci]"
          
          echo "Pushing changes to remote..."
          
          # تلاش برای پاش با ریتری
          RETRY=0
          while [ $RETRY -lt 5 ]; do
            RETRY=$((RETRY + 1))
            
            # هندل کردن تداخل احتمالی
            git fetch origin
            git reset --hard origin/${{ github.ref_name }}
            
            git push origin HEAD:${{ github.ref_name }} 2>&1
            if [ $? -eq 0 ]; then
              echo "✅ Successfully pushed clean state."
              exit 0
            fi
            
            echo "Push failed, retrying ($RETRY/5)..."
            sleep 3
          done

      - name: Cleanup large files from history (Optional but recommended)
        run: |
          echo "This step ensures files are removed from history to save space."
          echo "Note: If files were very large, you might need BFG Repo-Cleaner or filter-branch for deep cleanup."
          echo "Current push removes them from the latest commit."
